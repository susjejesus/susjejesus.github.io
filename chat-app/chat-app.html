<!DOCTYPE html>
<html>

<head>
    <title>Web Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fascinate&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@1,100&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Cherry+Cream+Soda&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            display: flex;
            height: 100%;
            width: 100%;
            background-color: #444343;
        }

        .parent-container {
            display: none;
            padding-top: 1%;
            height: 98%;
            width: 100%;
            background-color: #444343;
            justify-content: center;
            align-items: center;
        }

        .chat-container {
            border: 1px solid;
            border-radius: 20px;
            width: 35%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background-color: dodgerblue;
        }

        .header {
            padding-top: 5px;
            padding-bottom: 5px;
            color: white;
            display: flex;
            justify-content: center;
            font-family: 'Fascinate', cursive;
        }

        #body {
            padding-top: 5px;
            padding-left: 5px;
            padding-bottom: 5px;
            padding-right: 5px;
            background-color: rgba(0, 0, 0, 0.7);
            height: 85%;
            overflow-y: auto;
        }

        .user-message {
            display: flex;
            width: 100%;
            justify-content: right;
            padding-bottom: 5px;
        }

        #message-holder {
            background-color: white;
            border-radius: 10px;
            width: fit-content;
            padding-left: 4px;
            padding-right: 4px;
            padding-top: 2px;
            padding-bottom: 2px;
            color: black;
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
        }

        .received-message {
            display: flex;
            width: 100%;
            justify-content: left;
            padding-bottom: 5px;
        }

        #received-message-holder {
            background-color: greenyellow;
            border-radius: 10px;
            width: fit-content;
            padding-left: 4px;
            padding-right: 4px;
            padding-top: 2px;
            padding-bottom: 2px;
            color: black;
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
        }

        .input {
            padding-top: 5px;
            padding-bottom: 5px;
        }

        .input input[type="text"] {
            position: relative;
            width: 85%;
            height: 60%;
            bottom: 30%;
            left: 1%;
            border-radius: 20px;
            font-size: large;
            font-weight: bold;
            font-family: 'Roboto Mono', monospace;
        }

        .input button {
            position: relative;
            left: 1%;
            border-radius: 20px;
            background-color: cornflowerblue;
            width: 12.5%;
            height: 90%;
        }

        .input button:hover {
            position: relative;
            left: 1%;
            border-radius: 20px;
            background-color: rgb(79, 118, 192);
            width: 12.5%;
            height: 90%;
        }

        .input img {
            width: 100%;
            height: 100%;
        }

        .title-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            align-items: center;
        }

        .title {
            display: flex;
            flex-direction: column;
            position: absolute;
            text-align: center;
        }

        .title h1 {
            padding-top: 5px;
            padding-bottom: 5px;
            color: white;
            display: flex;
            justify-content: center;
            font-family: 'Fascinate', cursive;
            font-size: 60px;
        }

        .title p {
            padding-bottom: 5px;
            color: white;
            justify-content: center;
            font-family: 'Roboto Mono', monospace;
            font-size: 20px;
        }

        .title img {
            display: block;
            margin-left: auto;
            margin-right: auto;
            padding-top: 3%;
        }

        .login-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: absolute;
            align-items: center;
            justify-content: center;
        }

        .login {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding-top: 5%;
        }

        #sign-up {
            top: 2%;
            bottom: 2%;
            left: 2%;
            right: 2%;
            width: fit-content;
            height: fit-content;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
        }

        #name {
            width: 200px;
            height: 30px;
            font-family: 'Roboto Mono', monospace;
            font-weight: 900;
            font-size: large;
        }

        .error {
            display: flex;
            justify-content: center;
        }

        #error-message {
            position: absolute;
            color: red;
            font-family: 'Cherry Cream Soda', cursive;
            font-size: 30px;
        }
    </style>
    <link rel="icon" type="image/png" href="images/favicon.png">
</head>

<body>

    <div class="parent-container">
        <div class="chat-container">

            <div class="header">
                <h1>Web Chat App</h1>
            </div>

            <div id="body">
                <!-- The chat messages are inserted here -->
            </div>

            <div class="input">
                <input type="text" name="message" id="message-felid" placeholder="Say something" maxlength="100">
                <button id="send">
                    <img src="./images/send.png" alt="Paper Airplane send button" width="50px" height="50px">
                </button>
            </div>
        </div>
    </div>

    <div class="title-container">
        <div class="title">
            <h1>Web Chat App</h1>
            <p>
                created by susjejesus
                <br>
                Github: susjejesus
            </p>
            <img src="./images/favicon.png" alt="favicon" width="150px" height="150px">
        </div>
    </div>

    <article class="login-container">
        <div class="login">
            <input type="text" id="name" name="text" placeholder="Name" maxlength="15"><br>
            <button id="sign-up">Sign up</button>
            <div class="error">
                <h1 id="error-message"></h1>
            </div>
        </div>
    </article>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.4.1/firebase-app.js"></script>

    <script>
        //  Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCClPUiPJpiad4hOkUEnp3FVdR2KBJYcLo",
            authDomain: "chat2-8b7ba.firebaseapp.com",
            projectId: "chat2-8b7ba",
            storageBucket: "chat2-8b7ba.appspot.com",
            messagingSenderId: "905473349275",
            appId: "1:905473349275:web:1c239018cc6c96dc9b183e"
        };
        firebase.initializeApp(firebaseConfig);

        let userId;
        let userRef;
        let messageRef;
        let snapshotV;
        let owner;
        let online;
        let subStringId;
        let subString;
        let clicked;
        let nameRef;
        let aMessage = "";
        let reload = 0;
        let nameTaken = [];
        let allNames = [];
        let userName = createName();
        let signUpButton = document.querySelector('#sign-up');
        let name = document.querySelector('#name');
        let body = document.getElementById("body");
        let messageInput = document.querySelector('#message-felid');
        let sendMessage = document.querySelector('#send');
        function randomFromArray(array) {
            return array[Math.floor(Math.random() * array.length)];
        }

        function createName() {
            const prefix = randomFromArray([
                "COOL",
                "SUPER",
                "HIP",
                "SMUG",
                "COOL",
                "SILKY",
                "GOOD",
                "SAFE",
                "DEAR",
                "DAMP",
                "WARM",
                "RICH",
                "LONG",
                "DARK",
                "SOFT",
                "BUFF",
                "DOPE",
            ]);
            const animal = randomFromArray([
                "BEAR",
                "DOG",
                "CAT",
                "FOX",
                "LAMB",
                "LION",
                "BOAR",
                "GOAT",
                "VOLE",
                "SEAL",
                "PUMA",
                "MULE",
                "BULL",
                "BIRD",
                "BUG",
            ]);
            const number = Math.floor(Math.random() * 1000);
            return `${prefix} ${animal} ${number}`;
        }
        function createSubstring(subStringId) {
            let subSet1 = subStringId.substring(1, 4);
            let subSet2 = subStringId.substring(6, 10);
            let subSet3 = subStringId.substring(1, 2);
            let subSet4 = subStringId.substring(3, 8);
            let subSet5 = subStringId.substring(1, 2);
            let subSet6 = subStringId.substring(8, 15);
            let subSet7 = subStringId.substring(1, 9);
            let subSet8 = subStringId.substring(5, 10);

            return `${subSet1}${subSet2}${subSet3}${subSet4}${subSet5}${subSet3}${subSet2}${subSet6}${subSet7}${subSet8}`;
        }
        function userMessage() {
            const messageVal = snapshotV;
            const message = messageVal.message;
            const messageElement = document.createElement("div");
            messageElement.classList.add("message-holder");

            messageElement.innerHTML = (`
        <div class="user-message">
            <div id="message-holder">
                <p id="sender">${userName + ':'}</p>
                <p id="message">${message}</p>
            </div>
        </div>
    `)

            // Adds the message to the body
            body.appendChild(messageElement);

            // Message autoscrolls into view
            messageElement.scrollIntoView();
        }

        function senderMessage() {
            const messageVal = snapshotV;
            const message = messageVal.message;
            const messageElement = document.createElement("div");
            messageElement.classList.add("received-message-holder");

            messageElement.innerHTML = (`
        <div class="received-message">
            <div id="received-message-holder">
                <p id="sender">${messageVal.userName}</p>
                <p id="message">${message}</p>
            </div>
        </div>
    `)

            // Adds the message to the body
            body.appendChild(messageElement);

            // Message autoscrolls into view
            messageElement.scrollIntoView();
        }

        function userSentMessage() {
            if (messageInput.value.length != 0) {
                // The user sent a message with data

                // Checks for if the message if bigger than 25 letter
                if (messageInput.value.length <= 25) smallerMessage(); else if (messageInput.value.length > 25 && messageInput.value.length <= 50) {
                    biggerMessage();
                } else if (messageInput.value.length > 50 && messageInput.value.length <= 75) {
                    evenBiggerMessage();
                } else if (messageInput.value.length > 75 && messageInput.value.length <= 100) {
                    biggestMessage();
                }

                // Gets the date and time the message was sent
                let today = new Date();
                let date = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
                let time = today.getHours() + ":" + today.getMinutes() + ":" + today.getSeconds();
                let dateTime = date + '' + time;
                let messageId = userId + dateTime;

                // Sends message to firebase
                messageRef = firebase.database().ref(`messages/${messageId}`);

                messageRef.set({
                    userId,
                    message: aMessage,
                    time: ('on ' + date) + (' at ' + time),
                    userName: userName + ':',
                });

                // Clears the send message feild after the user sends a message
                messageInput.value = '';

            } else {
                // The user tried to send an empty message
            }
        }

        function smallerMessage() {
            aMessage = messageInput.value;
        }

        function biggerMessage() {
            let f25 = messageInput.value.substring(0, 25);
            let l25 = messageInput.value.substring(25, messageInput.value.length);

            aMessage = (f25 + '<br>') + l25;
        }

        function evenBiggerMessage() {
            let f25 = messageInput.value.substring(0, 25);
            let s25 = messageInput.value.substring(25, 50);
            let l25 = messageInput.value.substring(50, messageInput.value.length);


            aMessage = (f25 + '<br>') + (s25 + '<br>') + l25;
        }

        function biggestMessage() {
            let f25 = messageInput.value.substring(0, 25);
            let s25 = messageInput.value.substring(25, 50);
            let t25 = messageInput.value.substring(50, 75);
            let l25 = messageInput.value.substring(75, messageInput.value.length);


            aMessage = (f25 + '<br>') + (s25 + '<br>') + (t25 + '<br>') + l25;
            console.log(aMessage);
        }
        function initChat() {
            let allUsersCount = firebase.database().ref(`users`);
            let messageReceived = firebase.database().ref(`messages`);

            allUsersCount.on("child_added", (snapshot) => {
                online += 1;
            })

            // Message
            messageReceived.on("child_added", (snapshot) => {
                const messageVal = snapshot.val();
                snapshotV = snapshot.val();
                if (messageVal.userId === userId) userMessage(); else senderMessage();
            })
        }
        firebase.auth().onAuthStateChanged((user) => {
            if (user) {
                // Logged in

                // Creates a specific string that will store the users name and information
                subStringId = user.uid;
                subString = createSubstring(subStringId);

                if (clicked === 1) {
                    clicked = 0;
                    nameRef = firebase.database().ref(`names/account/${subString}`);

                    let today = new Date();
                    let date = today.getFullYear() + '-' + (today.getMonth() + 1) + '-' + today.getDate();
                    let time = today.getHours() + ":" + today.getMinutes() + ":" + today.getSeconds();
                    let accountCreated = date + '' + time;

                    nameRef.set({
                        userName,
                        id: user.uid,
                        accountCreated,
                        subString
                    })
                } else {
                    const firebaseRef = firebase.database().ref(`names/account`);
                    firebaseRef.once("value", function (snapshot) {
                        snapshot.forEach(function (element) {
                            if (subString === element.val().subString) {
                                userName = element.val().userName;
                            }
                        })
                    });
                }

                document.querySelector('.parent-container').style.display = "flex";
                document.querySelector('.title-container').remove;
                document.querySelector('.login-container').remove();

                if (user.uid === 'hFxcgexxJGg2CjaREsggkBzXqCI2') {
                    owner = true;
                    userName = "<h5 style='color:red'>[Owner] susjejesus</h5>";
                } else owner = false;

                // Checks for when the user sends a message
                sendMessage.addEventListener('click', () => {
                    userSentMessage();
                });
                document.addEventListener('keypress', (event) => {
                    switch (event.key) {
                        case 'Enter':
                            userSentMessage();
                            break;
                    }
                })

                userId = user.uid;
                userRef = firebase.database().ref(`users/${userId}`);

                userRef.set({
                    id: userId,
                    userName,
                    owner
                });

                // Remove user when the log out
                userRef.onDisconnect().remove();

                // Begin when I sign in
                initChat();

            } else {
                // Logged out

                const firebaseRef = firebase.database().ref(`names/account`);
                firebaseRef.once("value", function (snapshot) {
                    snapshot.forEach(function (element) {
                        allNames.push(element.val().userName);
                        // console.log(allNames);
                    })
                });

                // console.log(allNames);

                name.value = userName;

                signUpButton.addEventListener('click', () => {
                    for (var i = 0; i < allNames.length; i++) {
                        if (name.value != allNames[i]) {

                        } else if (name.value === allNames[i]) {
                            nameTaken.push(allNames[i]);
                        }
                    }

                    window.setTimeout(function () {
                        if (name.value.length != 0) {
                            if (name.value != nameTaken[0]) {
                                firebase.auth().signInAnonymously().catch((error) => {
                                    var errorCode = error.code;
                                    var errorMessage = error.message;
                                    // ...
                                    console.log(errorCode, errorMessage);
                                });

                                userName = name.value;
                                clicked = 1;
                            } else {
                                nameTaken = [];
                                document.getElementById("error-message").innerHTML = "That name is already taken";
                            }
                        } else {
                            document.getElementById("error-message").innerHTML = "You must have a name to sign up";
                        }
                    }, 1000)
                });

                signUpButton.addEventListener('click', () => {
                });

                name.addEventListener('click', () => {
                    document.getElementById("error-message").innerHTML = "";
                });
            }
        });
    </script>
</body>

</html>
